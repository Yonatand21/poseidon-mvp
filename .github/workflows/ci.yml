---
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write        # image-build pushes to GHCR on main
  id-token: write        # reserved for future cosign OIDC signing

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  IMAGE_REPO: ${{ github.event.repository.name }}

jobs:
  markdown-lint:
    name: markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !.venv/**
            !build/**
            !dist/**

  yaml-lint:
    name: yaml lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pipx install yamllint==1.35.1
      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Lint umbrella chart
        run: helm lint charts/poseidon-platform

  compose-config:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate base compose
        run: docker compose -f deploy/compose/docker-compose.yml config --quiet
      - name: Validate GPU overlay
        run: docker compose -f deploy/compose/docker-compose.yml -f deploy/compose/docker-compose.gpu.yml config --quiet

  uv-lock:
    name: uv lock check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"
      - name: Set up Python
        run: uv python install 3.11
      - name: Verify lockfile is current
        run: uv lock --check

  layer-permissions:
    name: layer permission lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run layer-permission check
        run: python tools/check_layer_permissions.py

  setup-scripts-syntax:
    name: setup script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash -n on setup-mac.sh
        run: bash -n tools/setup-mac.sh
      - name: Bash -n on setup-linux.sh
        run: bash -n tools/setup-linux.sh
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: ShellCheck setup-mac.sh
        run: shellcheck -S warning tools/setup-mac.sh
      - name: ShellCheck setup-linux.sh
        run: shellcheck -S warning tools/setup-linux.sh

  image-build:
    name: build base-dev image
    runs-on: ubuntu-latest
    needs: [yaml-lint, helm-lint, compose-config]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_REPO }}/poseidon-base-dev
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=dev,enable={{is_default_branch}}
      - name: Build and (conditionally) push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/base-dev.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=poseidon-base-dev
          cache-to: type=gha,mode=max,scope=poseidon-base-dev

  image-smoke:
    name: smoke test base-dev image
    runs-on: ubuntu-latest
    needs: [image-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull amd64 image
        run: |
          docker pull --platform linux/amd64 \
            ${REGISTRY}/${IMAGE_OWNER}/${IMAGE_REPO}/poseidon-base-dev:dev
      - name: ros2 --help works
        run: |
          docker run --rm --platform linux/amd64 \
            ${REGISTRY}/${IMAGE_OWNER}/${IMAGE_REPO}/poseidon-base-dev:dev \
            bash -c "ros2 --help | head -5"
      - name: python3 version
        run: |
          docker run --rm --platform linux/amd64 \
            ${REGISTRY}/${IMAGE_OWNER}/${IMAGE_REPO}/poseidon-base-dev:dev \
            python3 --version
      - name: uv version
        run: |
          docker run --rm --platform linux/amd64 \
            ${REGISTRY}/${IMAGE_OWNER}/${IMAGE_REPO}/poseidon-base-dev:dev \
            uv --version
