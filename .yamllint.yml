---
extends: default

rules:
  line-length:
    max: 120
    level: warning
  document-start:
    present: true
  truthy:
    allowed-values: ["true", "false", "on", "off"]
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  .venv/
  build/
  dist/
  node_modules/
