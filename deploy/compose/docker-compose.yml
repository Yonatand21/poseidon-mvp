---
# POSEIDON MVP - Profile A (Dev / Demo) dev workstation stack.
#
# INFRASTRUCTURE_DESIGN.md Section 4.1 (Dev workstation - Docker Compose).
# SYSTEM_DESIGN.md Section 18.2 (24-hour hackathon sprint scope).
#
# Quickstart:
#   cp .env.example .env          # one-time
#   docker compose --profile core up
#
# Profiles:
#   core    mission-essential (sim + mcap-recorder)
#   ai      Layer 3 / Layer 4 AI runtime (optional)
#   viz     Foxglove + (future) Unreal bridge (optional)
#
# Images default to local tags (`:dev`) built via `docker buildx build`.
# On machines that cannot build locally (Mac M4), pull from GHCR by
# overriding POSEIDON_IMAGE_REGISTRY in .env.
#
# For GPU nodes (cloud demo box), layer on:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up

name: poseidon-mvp

x-common-env: &common-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
  RCUTILS_COLORIZED_OUTPUT: "1"
  POSEIDON_SCENARIO: ${POSEIDON_SCENARIO:-scenarios/hero_choke_point_gnss_denied.yaml}
  POSEIDON_AI_MODE: ${POSEIDON_AI_MODE:-off}

x-common-volumes: &common-volumes
  - ../../scenarios:/workspace/scenarios:ro
  - ../../poseidon-sim:/workspace/poseidon-sim
  - ../../recordings:/recordings

services:
  # --- core (mission-essential) ---

  sim:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-sim:${POSEIDON_IMAGE_TAG:-dev}
    pull_policy: ${POSEIDON_PULL_POLICY:-missing}
    build:
      context: ../..
      dockerfile: deploy/docker/poseidon-sim.Dockerfile
    environment:
      <<: *common-env
    volumes:
      - ../../scenarios:/workspace/scenarios:ro
      - ../../poseidon-sim:/workspace/poseidon-sim
      - ../../recordings:/recordings
      - ./sim-entrypoint.sh:/usr/local/bin/sim-entrypoint.sh:ro
    networks: [ros2net]
    profiles: [core, default]
    # sim-entrypoint.sh routes to Stonefish on amd64 or the mock sim on arm64.
    entrypoint: ["/ros_entrypoint.sh"]
    command: ["/usr/local/bin/sim-entrypoint.sh"]

  mcap-recorder:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    pull_policy: ${POSEIDON_PULL_POLICY:-missing}
    build:
      context: ../..
      dockerfile: deploy/docker/base-dev.Dockerfile
    environment:
      <<: *common-env
    volumes: *common-volumes
    networks: [ros2net]
    depends_on:
      - sim
    profiles: [core, default]
    command: >
      bash -c "mkdir -p /recordings &&
      ros2 bag record -a -s mcap -o /recordings/run_$$(date +%Y%m%d_%H%M%S)"

  # --- ai (mission-enhancing, Layer 3 + Layer 4) ---

  ai-runtime:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    environment:
      <<: *common-env
    volumes:
      - ../../scenarios:/workspace/scenarios:ro
      - ../../poseidon-sim:/workspace/poseidon-sim
      - ../../models:/workspace/models:ro
    networks: [ros2net]
    profiles: [ai]
    command: >
      bash -c "echo 'ai-runtime placeholder - first module lands with
      the spoof detector' && sleep infinity"

  eval-ai:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    environment:
      <<: *common-env
    volumes:
      - ../../recordings:/recordings:ro
      - ../../poseidon-sim:/workspace/poseidon-sim
    networks: [ros2net]
    profiles: [ai]
    command: ["bash", "-c", "echo 'eval-ai placeholder - offline LLM summarization lands later' && sleep infinity"]

  # --- viz (mission-enhancing, Profile A only) ---

  foxglove:
    image: ghcr.io/foxglove/studio:latest
    ports:
      - "8080:8080"
    networks: [ros2net]
    profiles: [viz]

  unreal-bridge:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    environment:
      <<: *common-env
    volumes:
      - ../../poseidon-sim/rendering:/workspace/rendering
    networks: [ros2net]
    ports:
      - "9090:9090"
    profiles: [viz]
    command: >
      bash -c "echo 'unreal-bridge placeholder - rosbridge_websocket
      launches here (see ADR-0001)' && sleep infinity"

networks:
  ros2net:
    driver: bridge
