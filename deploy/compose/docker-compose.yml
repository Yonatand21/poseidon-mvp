---
# POSEIDON MVP - Profile A (Dev / Demo) dev workstation stack.
#
# INFRASTRUCTURE_DESIGN.md Section 4.1 (Dev workstation - Docker Compose).
# SYSTEM_DESIGN.md Section 18.2 (24-hour hackathon sprint scope).
#
# Quickstart:
#   cp .env.example .env          # one-time
#   docker compose --profile core up
#
# Profiles:
#   core    mission-essential (sim-auv + sim-ssv + federation + scenario + mcap-recorder)
#   ai      Layer 3 / Layer 4 AI runtime (optional)
#   viz     Foxglove + UNav-Sim/PoseidonUE bridge placeholders (optional)
#
# Images default to local tags (`:dev`) built via `docker buildx build`.
# On machines that cannot build locally (Mac M4), pull from GHCR by
# overriding POSEIDON_IMAGE_REGISTRY in .env.
#
# For GPU nodes (cloud demo box), layer on:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up

name: poseidon-mvp

x-common-env: &common-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
  RCUTILS_COLORIZED_OUTPUT: "1"
  POSEIDON_SCENARIO: ${POSEIDON_SCENARIO:-scenarios/hero_choke_point_gnss_denied.yaml}
  POSEIDON_AI_MODE: ${POSEIDON_AI_MODE:-off}

x-common-volumes: &common-volumes
  - ../../scenarios:/workspace/scenarios:ro
  - ../../poseidon-sim:/workspace/poseidon-sim
  - ../../recordings:/recordings

services:
  # --- core (mission-essential) ---

  sim-auv:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    pull_policy: ${POSEIDON_PULL_POLICY:-missing}
    # Day 2 planned DAVE image path:
    # image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-sim-auv-dave:${POSEIDON_IMAGE_TAG:-dev}
    # build:
    #   context: ../..
    #   dockerfile: deploy/docker/sim-auv-dave.Dockerfile
    build:
      context: ../..
      dockerfile: deploy/docker/base-dev.Dockerfile
    environment:
      <<: *common-env
    volumes:
      - ../../poseidon-sim:/workspace/poseidon-sim:ro
    networks: [ros2net]
    profiles: [core, default]
    # Mac-safe fallback during prep/wiring phase.
    # Future Linux/NVIDIA DAVE path will replace this command after
    # sim-auv-dave.Dockerfile and auv_dave.launch.py are fully wired.
    #
    # Planned shape:
    # command: >
    #   bash -lc "source /opt/ros/jazzy/setup.bash &&
    #   ros2 launch /workspace/poseidon-sim/auv_sim/launch/auv_dave.launch.py
    #   use_mock_backend:=false
    #   world_name:=dave_ocean_waves.world
    #   vehicle_name:=rexrov"
    command: >
      bash -lc "source /opt/ros/jazzy/setup.bash &&
      python3 /workspace/poseidon-sim/auv_sim/src/mock_auv_runtime.py"

  sim-ssv:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-sim-ssv-vrx:${POSEIDON_IMAGE_TAG:-dev}
    pull_policy: ${POSEIDON_PULL_POLICY:-missing}
    build:
      context: ../..
      dockerfile: deploy/docker/sim-ssv-vrx.Dockerfile
    environment:
      <<: *common-env
    # Read-only bind: poseidon_ssv_sim is now baked into the image at
    # build time per AGENTS.md Section 3 (Profile B). The mount stays
    # for live-edit dev workflows that override `command:` to
    # rebuild-and-launch from /workspace.
    volumes:
      - ../../poseidon-sim:/workspace/poseidon-sim:ro
    networks: [ros2net]
    profiles: [core, default]
    # No command override: the image's CMD launches ssv_vrx.launch.py
    # with seed:=${POSEIDON_SCENARIO_SEED:-42}.

  env-service:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    pull_policy: ${POSEIDON_PULL_POLICY:-missing}
    build:
      context: ../..
      dockerfile: deploy/docker/base-dev.Dockerfile
    environment:
      <<: *common-env
    volumes:
      - ../../poseidon-sim:/workspace/poseidon-sim:ro
    networks: [ros2net]
    profiles: [core, default]
    command: >
      bash -lc "source /opt/ros/jazzy/setup.bash &&
      python3 /workspace/poseidon-sim/env_service/src/mock_env_service.py"

  federation-bridge:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    pull_policy: ${POSEIDON_PULL_POLICY:-missing}
    build:
      context: ../..
      dockerfile: deploy/docker/base-dev.Dockerfile
    environment:
      <<: *common-env
    volumes:
      - ../../poseidon-sim:/workspace/poseidon-sim:ro
    depends_on:
      - sim-auv
      - sim-ssv
    networks: [ros2net]
    profiles: [core, default]
    command: >
      bash -lc "source /opt/ros/jazzy/setup.bash &&
      python3 /workspace/poseidon-sim/coupling/src/federation_bridge.py"

  scenario-engine:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    pull_policy: ${POSEIDON_PULL_POLICY:-missing}
    build:
      context: ../..
      dockerfile: deploy/docker/base-dev.Dockerfile
    environment:
      <<: *common-env
    volumes:
      - ../../poseidon-sim:/workspace/poseidon-sim:ro
      - ../../recordings:/recordings
    depends_on:
      - federation-bridge
    networks: [ros2net]
    profiles: [core, default]
    command: >
      bash -lc "source /opt/ros/jazzy/setup.bash &&
      python3 /workspace/poseidon-sim/scenario_engine/src/run_scenario_mvp.py"

  mcap-recorder:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    pull_policy: ${POSEIDON_PULL_POLICY:-missing}
    build:
      context: ../..
      dockerfile: deploy/docker/base-dev.Dockerfile
    environment:
      <<: *common-env
    volumes: *common-volumes
    networks: [ros2net]
    depends_on:
      - sim-auv
      - sim-ssv
      - federation-bridge
      - scenario-engine
    profiles: [core, default]
    command: >
      bash -c "mkdir -p /recordings &&
      ros2 bag record -a -s mcap -o /recordings/run_$$(date +%Y%m%d_%H%M%S)"

  # --- ai (mission-enhancing, Layer 3 + Layer 4) ---

  ai-runtime:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    environment:
      <<: *common-env
    volumes:
      - ../../scenarios:/workspace/scenarios:ro
      - ../../poseidon-sim:/workspace/poseidon-sim
      - ../../models:/workspace/models:ro
    networks: [ros2net]
    profiles: [ai]
    command: >
      bash -c "echo 'ai-runtime placeholder - first module lands with
      the spoof detector' && sleep infinity"

  eval-ai:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-base-dev:${POSEIDON_IMAGE_TAG:-dev}
    environment:
      <<: *common-env
    volumes:
      - ../../recordings:/recordings:ro
      - ../../poseidon-sim:/workspace/poseidon-sim
    networks: [ros2net]
    profiles: [ai]
    command: ["bash", "-c", "echo 'eval-ai placeholder - offline LLM summarization lands later' && sleep infinity"]

  # --- viz (mission-enhancing, Profile A only) ---

  foxglove:
    image: ghcr.io/foxglove/studio:latest
    ports:
      - "8080:8080"
    networks: [ros2net]
    profiles: [viz]

  # ROS 2 -> Unreal bridge (rosbridge_websocket).
  # Serves PoseidonUE on dev workstations and the MCAP replay path
  # (docs/runbooks/ue5-mcap-replay.md). Per ADR-0002, UNav-Sim on the
  # cloud box uses its own native ROS 2 bridge instead, but this
  # service stays deployed for the fallback + replay paths.
  # Topic allowlist (Rule 1.1 enforcement) lives at
  # poseidon-sim/rendering/bridge/rosbridge_server_allowlist.yaml.
  unreal-bridge:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-unreal-bridge:${POSEIDON_IMAGE_TAG:-dev}
    pull_policy: ${POSEIDON_PULL_POLICY:-missing}
    build:
      context: ../..
      dockerfile: poseidon-sim/rendering/bridge/Dockerfile
    environment:
      <<: *common-env
    volumes:
      - ../../poseidon-sim/rendering:/workspace/poseidon-sim/rendering:ro
    networks: [ros2net]
    ports:
      - "9090:9090"
    profiles: [viz]
    command: >
      bash -lc "source /opt/ros/jazzy/setup.bash &&
      ros2 launch /workspace/poseidon-sim/rendering/bridge/bridge.launch.py"

  # UNav-Sim renderer (PRIMARY visual path per SYSTEM_DESIGN.md Section 13).
  # SKELETON: the Dockerfile builds a placeholder image that sleeps until
  # the rendering integration track lands real UNav-Sim wiring per
  # ADR-0002 + the integration-unav-sim runbook (TBD).
  # Hard host requirement: Linux + NVIDIA GPU (cloud demo box).
  unav-sim-render:
    image: ${POSEIDON_IMAGE_REGISTRY:-ghcr.io/yonatand21/poseidon-mvp}/poseidon-unav-sim:${POSEIDON_IMAGE_TAG:-dev}
    pull_policy: ${POSEIDON_PULL_POLICY:-missing}
    build:
      context: ../..
      dockerfile: deploy/docker/unav-sim.Dockerfile
    environment:
      <<: *common-env
    volumes:
      - ../../poseidon-sim/rendering:/workspace/poseidon-sim/rendering:ro
    networks: [ros2net]
    profiles: [viz]

networks:
  ros2net:
    driver: bridge
